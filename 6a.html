<!doctype html>
<html>
  <head>
    <title>CSS Font and Text Properties</title>

    <style>
      /* font-size */
      .size {
        font-size: 24px; /* Property: font-size | Value: 24px */
      }

      /* font-weight */
      .weight {
        font-weight: bold; /* Property: font-weight | Value: bold */
      }

      /* font-style */
      .style {
        font-style: italic; /* Property: font-style | Value: italic */
      }

      /* text-decoration */
      .decoration {
        text-decoration: underline; /* Property: text-decoration | Value: underline */
      }

      /* text-transform */
      .transform {
        text-transform: uppercase; /* Property: text-transform | Value: uppercase */
      }

      /* text-align */
      .alignment {
        text-align: center; /* Property: text-align | Value: center */
      }
    </style>
  </head>

  <body>
    <h1>CSS Font and Text Properties Demo</h1>

    <p class="size">This text demonstrates font-size.</p>

    <p class="weight">This text demonstrates font-weight.</p>

    <p class="style">This text demonstrates font-style.</p>

    <p class="decoration">This text demonstrates text-decoration.</p>

    <p class="transform">This text demonstrates text-transform.</p>

    <p class="alignment">This text demonstrates text-align.</p>
  </body>
</html>
