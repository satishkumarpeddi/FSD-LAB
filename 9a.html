<!doctype html>
<html>
  <head>
    <title>Largest of Three Numbers</title>

    <script>
      function findLargest() {
        // گرفتن input from user
        let num1 = parseInt(prompt("Enter first integer:"));
        let num2 = parseInt(prompt("Enter second integer:"));
        let num3 = parseInt(prompt("Enter third integer:"));

        let message;

        // Logic to find largest or equality
        if (num1 === num2 && num2 === num3) {
          message = "EQUAL NUMBERS";
        } else {
          let largest = Math.max(num1, num2, num3);
          message = largest + " LARGER NUMBER";
        }

        // Display in HTML
        document.getElementById("result").innerHTML = message;

        // Information message dialog
        alert(message);
      }
    </script>
  </head>

  <body>
    <h1>Find Largest Number</h1>

    <button onclick="findLargest()">Enter Numbers</button>

    <p id="result"></p>
  </body>
</html>
