<!doctype html>
<html>
  <head>
    <title>CSS Color Formats</title>

    <style>
      /* 1. Color Name */
      .color-name {
        color: red; /* Named color */
      }

      /* 2. Hexadecimal */
      .hex {
        color: #00ff00; /* Green */
      }

      /* 3. RGB */
      .rgb {
        color: rgb(0, 0, 255); /* Blue */
      }

      /* 4. RGBA (with transparency) */
      .rgba {
        color: rgba(255, 0, 0, 0.5); /* Semi-transparent red */
      }

      /* 5. HSL */
      .hsl {
        color: hsl(120, 100%, 50%); /* Green */
      }

      /* 6. HSLA */
      .hsla {
        color: hsla(240, 100%, 50%, 0.5); /* Semi-transparent blue */
      }

      /* 7. Background color examples */
      .bg-example {
        background-color: #f0f0f0;
        padding: 10px;
      }
    </style>
  </head>

  <body>
    <h1>CSS Color Representation Methods</h1>

    <p class="color-name">This text uses a color name (red).</p>

    <p class="hex">This text uses HEX color (#00FF00).</p>

    <p class="rgb">This text uses RGB color (rgb(0,0,255)).</p>

    <p class="rgba">This text uses RGBA with transparency.</p>

    <p class="hsl">This text uses HSL color.</p>

    <p class="hsla">This text uses HSLA with transparency.</p>

    <div class="bg-example">This box demonstrates background color.</div>
  </body>
</html>
