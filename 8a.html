<!doctype html>
<html>
  <head>
    <title>Document Object Demo</title>

    <script>
      function showDetails() {
        // Using document properties
        let title = document.title;
        let url = document.URL;

        // Using document methods
        let heading = document.getElementById("heading").innerHTML;

        console.log(document);
        // Displaying output
        document.getElementById("output").innerHTML =
          "Title: " +
          title +
          "<br>" +
          "URL: " +
          url +
          "<br>" +
          "Heading Content: " +
          heading;
      }

      function changeContent() {
        // Using document method to modify content
        document.getElementById("heading").innerHTML =
          "Heading Changed using JavaScript!";

        document.body.style.backgroundColor = "lightyellow";
      }
    </script>
  </head>

  <body>
    <h1 id="heading">Original Heading</h1>

    <button onclick="showDetails()">Show Document Details</button>
    <button onclick="changeContent()">Change Content</button>

    <p id="output"></p>
  </body>
</html>
