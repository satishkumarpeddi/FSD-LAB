<!doctype html>
<html>
  <head>
    <title>Weekday Finder</title>
    <style>
      body {
        font-family: Arial;
        text-align: center;
        margin-top: 50px;
      }
      input,
      button {
        padding: 10px;
        font-size: 16px;
      }
      h2 {
        color: blue;
      }
    </style>
  </head>
  <body>
    <h1>Find Weekday</h1>

    <input type="number" id="day" placeholder="Enter number (1-7)" />
    <br /><br />
    <button onclick="findDay()">Get Day</button>

    <h2 id="result"></h2>

    <script>
      function findDay() {
        let day = parseInt(document.getElementById("day").value);
        let result;

        switch (day) {
          case 1:
            result = "Sunday";
            break;
          case 2:
            result = "Monday";
            break;
          case 3:
            result = "Tuesday";
            break;
          case 4:
            result = "Wednesday";
            break;
          case 5:
            result = "Thursday";
            break;
          case 6:
            result = "Friday";
            break;
          case 7:
            result = "Saturday";
            break;
          default:
            result = "Invalid input! Please enter a number between 1 and 7.";
        }

        document.getElementById("result").innerHTML = result;
      }
    </script>
  </body>
</html>
