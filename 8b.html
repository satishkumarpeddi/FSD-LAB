<!DOCTYPE html>
<html>
<head>
    <title>Voter Eligibility Check</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }
        table {
            margin: auto;
            border-collapse: collapse;
            width: 50%;
        }
        th, td {
            border: 1px solid black;
            padding: 10px;
        }
        th {
            background-color: #f2f2f2;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
        }
    </style>
</head>

<body>

<h2>Voter Information</h2>

<button onclick="getVoterInfo()">Enter Voter Details</button>

<br><br>

<table id="voterTable">
    <tr>
        <th>Name</th>
        <th>Age</th>
        <th>Eligibility</th>
    </tr>
</table>

<script>
function getVoterInfo() {
    var name = prompt("Enter your name:");
    var age = prompt("Enter your age:");

    age = parseInt(age);

    var eligibility;

    if (age >= 18) {
        eligibility = "Eligible to Vote";
    } else {
        eligibility = "Not Eligible";
    }

    var table = document.getElementById("voterTable");
    var row = table.insertRow();

    var cell1 = row.insertCell(0);
    var cell2 = row.insertCell(1);
    var cell3 = row.insertCell(2);

    cell1.innerHTML = name;
    cell2.innerHTML = age;
    cell3.innerHTML = eligibility;
}
</script>

</body>
</html>
