  <head>

    <title>Largest-Number</title>
  </head>
  <body>
    <button onclick="largestNumberMethod()">Largest</button>
    <script>
      const largestNumberMethod = () => {
        let result = Math.max(10, 230, 3430, 342423);
        console.log(result);
        let array = [10, 20343, 3243232, 23432123434312];
        console.log(Math.max(...array));
      };
    </script>
  </body>
