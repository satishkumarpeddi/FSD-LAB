<!doctype html>
<html>
  <head>
    <title>CSS Box Model Demo</title>

    <style>
      .box {
        width: 300px; /* Content width */
        height: 150px; /* Content height */

        background-color: lightblue; /* Content area */

        padding: 20px; /* Space inside border */
        border: 5px solid black; /* Border around padding */
        margin: 30px; /* Space outside border */

        text-align: center;
      }
    </style>
  </head>

  <body>
    <h1>CSS Box Model Demonstration</h1>

    <div class="box">This is the CONTENT area</div>
  </body>
</html>
