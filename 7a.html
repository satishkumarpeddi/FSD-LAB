<!doctype html>
<html>
  <head>
    <title>Internal and External JavaScript</title>

    <!-- Internal JavaScript -->
    <script>
      function internalMessage() {
        alert("This is an Internal JavaScript message!");
      }
    </script>

    <!-- External JavaScript -->
    <script src="script.js"></script>
  </head>

  <body>
    <h1>JavaScript Types Demo</h1>

    <!-- Button for Internal JS -->
    <button onclick="internalMessage()">Click for Internal JS</button>

    <br /><br />

    <!-- Button for External JS -->
    <button onclick="externalMessage()">Click for External JS</button>
  </body>
</html>
