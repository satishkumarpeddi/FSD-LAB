<!doctype html>
<html>
  <head>
    <title>Number Operations</title>
    <style>
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        font-family: Arial;
        gap: 2em;
      }
      input {
        width: 250px;
        font-size: 1rem;
        font-weight: bold;
      }
      button {
        cursor: pointer;
        background-color: aqua;
        border: none;
        padding: 1em;
        border-radius: 1em;
        color: brown;
        font-size: 1em;
        font-weight: bold;
      }
      table {
        border-collapse: collapse;
        width: 60%;
      }
      th,
      td {
        border: 1px solid black;
        padding: 10px;
        text-align: center;
      }
    </style>

    <script>
      function factorial(n) {
        let fact = 1;
        for (let i = 1; i <= n; i++) {
          fact *= i;
        }
        return fact;
      }

      function fibonacci(n) {
        let a = 0,
          b = 1,
          series = "0 1 ";
        for (let i = 2; i < n; i++) {
          let c = a + b;
          series += c + " ";
          a = b;
          b = c;
        }
        return series;
      }

      function primes(n) {
        let result = "";
        for (let i = 2; i <= n; i++) {
          let isPrime = true;
          for (let j = 2; j <= Math.sqrt(i); j++) {
            if (i % j === 0) {
              isPrime = false;
              break;
            }
          }
          if (isPrime) result += i + " ";
        }
        return result;
      }

      function isPalindrome(n) {
        let original = n;
        let reverse = 0;

        while (n > 0) {
          let rem = n % 10;
          reverse = reverse * 10 + rem;
          n = Math.floor(n / 10);
        }
        return original === reverse;
      }

      function processNumber() {
        let num = parseInt(document.getElementById("number").value);

        if (isNaN(num)) {
          alert("Please enter a valid number");
          return;
        }

        let table = document.getElementById("result");

        // Clear previous rows except header
        table.innerHTML = `
        <tr>
          <th>Operation</th>
          <th>Result</th>
        </tr>
      `;

        function addRow(op, result) {
          let row = table.insertRow();
          row.insertCell(0).innerHTML = op;
          row.insertCell(1).innerHTML = result;
        }

        addRow("Factorial", factorial(num));
        addRow("Fibonacci", fibonacci(num));
        addRow("Prime Numbers", primes(num));
        addRow("Palindrome", isPalindrome(num) ? "Yes" : "No");
      }
    </script>
  </head>

  <body>
    <h1>Number Operations</h1>

    <input type="number" id="number" placeholder="Enter number" />
    <button onclick="processNumber()">Enter Number</button>

    <table id="result">
      <tr>
        <th>Operation</th>
        <th>Result</th>
      </tr>
    </table>
  </body>
</html>
